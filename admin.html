<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hired Teens — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --white:#FFFFFF; --bg-soft:#F4F8FC; --navy:#0F2540; --ink-soft:#5B7089;
    --blue:#2F6FED; --blue-deep:#1E4FC7; --blue-soft:#E9F0FE;
    --green:#17A673; --green-soft:#E4F8EF; --green-deep:#0F8259;
    --red:#C0392B; --red-soft:#FDEDEC;
    --border:#E3E9F2; --radius-sm:8px; --radius-md:14px;
    --shadow: 0 1px 2px rgba(15,37,64,0.04), 0 8px 24px rgba(15,37,64,0.06);
  }
  *{box-sizing:border-box;}
  body{ margin:0; background:var(--bg-soft); color:var(--navy); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; }
  h1,h2{ font-family:'Space Grotesk',sans-serif; }
  .wrap{ max-width:820px; margin:0 auto; padding:32px 24px 100px; }

  /* ---- password gate ---- */
  #gate{ min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
  .gate-card{
    background:var(--white); border:1px solid var(--border); border-radius:var(--radius-md);
    box-shadow:var(--shadow); padding:32px; width:100%; max-width:360px; text-align:center;
  }
  .gate-card h1{ font-size:22px; margin:0 0 6px; }
  .gate-card p{ font-size:13.5px; color:var(--ink-soft); margin:0 0 20px; }
  .gate-card input{
    width:100%; font-family:'Inter',sans-serif; font-size:14px; padding:11px 13px;
    border:1.5px solid var(--border); border-radius:var(--radius-sm); background:var(--bg-soft); margin-bottom:12px;
  }
  .gate-card input:focus{ outline:none; border-color:var(--blue); background:var(--white); }
  .gate-error{ font-size:13px; color:var(--red); margin-bottom:12px; min-height:16px; }

  /* ---- shared ---- */
  .btn{
    font-family:'Inter',sans-serif; font-weight:600; font-size:13.5px; cursor:pointer;
    padding:10px 18px; border-radius:999px; border:none; transition:background .15s ease;
  }
  .btn.primary{ background:var(--blue); color:var(--white); }
  .btn.primary:hover{ background:var(--blue-deep); }
  .btn.ghost{ background:var(--white); color:var(--navy); border:1.5px solid var(--border); }
  .btn.ghost:hover{ border-color:var(--blue); color:var(--blue); }
  .btn.danger{ background:var(--red-soft); color:var(--red); }
  .btn.danger:hover{ background:#FADBD8; }
  .btn.full{ width:100%; }
  .btn:disabled{ opacity:0.6; cursor:default; }

  /* ---- admin page ---- */
  #admin{ display:none; }
  .top-bar{
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:24px; padding-bottom:18px; border-bottom:1px solid var(--border);
  }
  .top-bar h1{ font-size:24px; margin:0; }
  .top-bar .count{ font-size:13px; color:var(--ink-soft); margin-top:2px; }
  .toolbar{ display:flex; gap:10px; margin-bottom:20px; }
  .toolbar input{
    flex:1; font-family:'Inter',sans-serif; font-size:14px; padding:10px 14px;
    border:1.5px solid var(--border); border-radius:var(--radius-sm); background:var(--white);
  }
  .toolbar input:focus{ outline:none; border-color:var(--blue); }

  .job-card{
    background:var(--white); border:1.5px solid var(--border); border-radius:var(--radius-md);
    margin-bottom:12px; overflow:hidden;
  }
  .job-main{
    display:flex; justify-content:space-between; align-items:flex-start; gap:16px; padding:16px 18px;
  }
  .job-title{ font-weight:700; font-size:15.5px; margin-bottom:3px; }
  .job-meta{ font-size:13px; color:var(--ink-soft); }
  .job-meta span + span::before{ content:"·"; margin:0 6px; }
  .job-actions{ display:flex; gap:8px; flex-shrink:0; }
  .job-actions button{ padding:8px 14px; font-size:12.5px; }

  .edit-panel{ display:none; padding:0 18px 18px; border-top:1px solid var(--border); }
  .edit-panel.open{ display:block; }
  .field-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:16px; }
  .field-grid .full{ grid-column:1 / -1; }
  .field label{ font-size:12px; font-weight:600; color:var(--navy); display:block; margin-bottom:5px; }
  .field input, .field select, .field textarea{
    width:100%; font-family:'Inter',sans-serif; font-size:13.5px; padding:9px 11px;
    border:1.5px solid var(--border); border-radius:var(--radius-sm); background:var(--bg-soft);
  }
  .field input:focus, .field select:focus, .field textarea:focus{ outline:none; border-color:var(--blue); background:var(--white); }
  .field textarea{ min-height:70px; resize:vertical; }
  .edit-actions{ display:flex; gap:10px; margin-top:16px; }
  .save-status{ font-size:12.5px; margin-top:10px; min-height:16px; }
  .save-status.error{ color:var(--red); }
  .save-status.success{ color:var(--green-deep); }

  .empty{ text-align:center; padding:60px 20px; color:var(--ink-soft); font-size:14px; }
  .loading{ text-align:center; padding:60px 20px; color:var(--ink-soft); font-size:14px; }
</style>
</head>
<body>

<div id="gate">
  <div class="gate-card">
    <h1>Hired Teens Admin</h1>
    <p>Enter the admin password to manage listings.</p>
    <input type="password" id="password-input" placeholder="Password" autocomplete="current-password" />
    <div class="gate-error" id="gate-error"></div>
    <button class="btn primary full" id="unlock-btn">Unlock</button>
  </div>
</div>

<div id="admin">
  <div class="wrap">
    <div class="top-bar">
      <div>
        <h1>Manage listings</h1>
        <div class="count" id="job-count"></div>
      </div>
      <div style="display:flex; gap:10px;">
        <button class="btn ghost" id="refresh-btn">Refresh</button>
        <button class="btn primary" id="add-listing-btn">+ Add listing</button>
      </div>
    </div>
    <div class="job-card" id="new-listing-card" style="display:none;">
      <div class="edit-panel open" id="new-listing-panel"></div>
    </div>
    <div class="toolbar">
      <input type="text" id="search-input" placeholder="Search by title, business, or location…" />
    </div>
    <div id="job-list"></div>
  </div>
</div>

<script>
const PAYMENTS_BACKEND_URL = 'https://teenpay.bonto.run';

let adminPassword = '';
let allJobs = [];
let searchTerm = '';
let openEditId = null;

function apiFetch(path, options){
  options = options || {};
  options.headers = Object.assign({}, options.headers, { 'X-Admin-Password': adminPassword });
  return fetch(PAYMENTS_BACKEND_URL + path, options);
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str ?? '';
  return d.innerHTML;
}

// ---- Password gate ----
document.getElementById('unlock-btn').addEventListener('click', unlock);
document.getElementById('password-input').addEventListener('keydown', (e)=>{
  if(e.key === 'Enter') unlock();
});

async function unlock(){
  const input = document.getElementById('password-input');
  const errorEl = document.getElementById('gate-error');
  const pw = input.value;
  if(!pw){ errorEl.textContent = 'Please enter a password.'; return; }

  errorEl.textContent = '';
  const btn = document.getElementById('unlock-btn');
  btn.disabled = true; btn.textContent = 'Checking…';

  adminPassword = pw;
  try{
    const res = await apiFetch('/admin/jobs');
    if(res.status === 401){
      errorEl.textContent = 'Incorrect password.';
      adminPassword = '';
      btn.disabled = false; btn.textContent = 'Unlock';
      return;
    }
    if(res.status === 503){
      errorEl.textContent = 'Admin access is not configured on the server yet.';
      adminPassword = '';
      btn.disabled = false; btn.textContent = 'Unlock';
      return;
    }
    if(!res.ok) throw new Error('Server error');
    allJobs = await res.json();
    document.getElementById('gate').style.display = 'none';
    document.getElementById('admin').style.display = 'block';
    render();
  }catch(err){
    console.error(err);
    errorEl.textContent = 'Could not reach the server. Please try again.';
    adminPassword = '';
    btn.disabled = false; btn.textContent = 'Unlock';
  }
}

// ---- Loading & rendering ----
async function loadJobs(){
  document.getElementById('job-list').innerHTML = '<div class="loading">Loading listings…</div>';
  try{
    const res = await apiFetch('/admin/jobs');
    if(!res.ok) throw new Error('Failed to load');
    allJobs = await res.json();
  }catch(err){
    document.getElementById('job-list').innerHTML = '<div class="empty">Could not load listings. Try refreshing.</div>';
    return;
  }
  render();
}

document.getElementById('refresh-btn').addEventListener('click', loadJobs);
document.getElementById('search-input').addEventListener('input', (e)=>{
  searchTerm = e.target.value.toLowerCase();
  render();
});

function matchesSearch(job){
  if(!searchTerm) return true;
  const hay = `${job.title} ${job.company} ${job.location}`.toLowerCase();
  return hay.includes(searchTerm);
}

function payDisplay(job){
  if(job.payType === 'unpaid') return 'Unpaid';
  if(!job.salary) return '—';
  const withDollar = job.salary.startsWith('$') ? job.salary : '$' + job.salary;
  const suffix = job.payType === 'hourly' ? '/hr' : job.payType === 'stipend' ? ' stipend' : '';
  return withDollar + suffix;
}

function render(){
  const listEl = document.getElementById('job-list');
  const visible = allJobs.filter(matchesSearch);
  document.getElementById('job-count').textContent = `${allJobs.length} total listing${allJobs.length === 1 ? '' : 's'}`;

  if(!visible.length){
    listEl.innerHTML = '<div class="empty">No listings match your search.</div>';
    return;
  }

  listEl.innerHTML = '';
  visible.forEach(job => {
    const card = document.createElement('div');
    card.className = 'job-card';
    card.innerHTML = `
      <div class="job-main">
        <div>
          <div class="job-title">${escapeHtml(job.title)}</div>
          <div class="job-meta">
            <span>${escapeHtml(job.company)}</span>
            <span>${escapeHtml(job.location)}</span>
            <span>${escapeHtml(payDisplay(job))}</span>
          </div>
        </div>
        <div class="job-actions">
          <button class="btn ghost" data-action="edit" data-id="${escapeHtml(job.id)}">Edit</button>
          <button class="btn danger" data-action="delete" data-id="${escapeHtml(job.id)}">Delete</button>
        </div>
      </div>
      <div class="edit-panel${openEditId === job.id ? ' open' : ''}" id="edit-${escapeHtml(job.id)}"></div>
    `;
    listEl.appendChild(card);
    if(openEditId === job.id){
      renderEditPanel(job);
    }
  });

  listEl.querySelectorAll('[data-action="edit"]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      openEditId = openEditId === btn.dataset.id ? null : btn.dataset.id;
      render();
    });
  });
  listEl.querySelectorAll('[data-action="delete"]').forEach(btn=>{
    btn.addEventListener('click', ()=> deleteJob(btn.dataset.id));
  });
}

function fieldFormHtml(job){
  job = job || {};
  return `
    <div class="field-grid">
      <div class="field"><label>Job title</label><input type="text" data-field="title" value="${escapeHtml(job.title || '')}" /></div>
      <div class="field"><label>Business or organization</label><input type="text" data-field="company" value="${escapeHtml(job.company || '')}" /></div>
      <div class="field"><label>Location</label><input type="text" data-field="location" value="${escapeHtml(job.location || '')}" /></div>
      <div class="field"><label>Work type</label>
        <select data-field="type">
          <option value="onsite" ${job.type==='onsite'||!job.type?'selected':''}>In-person</option>
          <option value="hybrid" ${job.type==='hybrid'?'selected':''}>Hybrid</option>
          <option value="remote" ${job.type==='remote'?'selected':''}>Remote</option>
        </select>
      </div>
      <div class="field"><label>Pay</label><input type="text" data-field="salary" value="${escapeHtml(job.salary || '')}" /></div>
      <div class="field"><label>Pay type</label>
        <select data-field="payType">
          <option value="hourly" ${job.payType==='hourly'||!job.payType?'selected':''}>Hourly</option>
          <option value="stipend" ${job.payType==='stipend'?'selected':''}>Stipend</option>
          <option value="unpaid" ${job.payType==='unpaid'?'selected':''}>Unpaid</option>
        </select>
      </div>
      <div class="field"><label>Start date</label><input type="date" data-field="startDate" value="${escapeHtml(job.startDate || '')}" /></div>
      <div class="field"><label>End date</label><input type="date" data-field="endDate" value="${escapeHtml(job.endDate || '')}" /></div>
      <div class="field"><label>Email</label><input type="email" data-field="email" value="${escapeHtml(job.email || '')}" /></div>
      <div class="field"><label>Link (optional)</label><input type="url" data-field="link" value="${escapeHtml(job.link || '')}" /></div>
      <div class="field full"><label>Tags (comma-separated)</label><input type="text" data-field="tags" value="${escapeHtml((job.tags||[]).join(', '))}" /></div>
      <div class="field full"><label>Description</label><textarea data-field="description">${escapeHtml(job.description || '')}</textarea></div>
    </div>
  `;
}

function readFieldForm(panel){
  const data = {};
  panel.querySelectorAll('[data-field]').forEach(el=>{
    if(el.dataset.field === 'tags'){
      data.tags = el.value.split(',').map(t=>t.trim()).filter(Boolean);
    }else{
      data[el.dataset.field] = el.value.trim();
    }
  });
  return data;
}

function renderEditPanel(job){
  const panel = document.getElementById(`edit-${job.id}`);
  panel.innerHTML = `
    ${fieldFormHtml(job)}
    <div class="edit-actions">
      <button class="btn primary" data-action="save">Save changes</button>
      <button class="btn ghost" data-action="cancel">Cancel</button>
    </div>
    <div class="save-status" id="save-status-${job.id}"></div>
  `;
  panel.querySelector('[data-action="save"]').addEventListener('click', ()=> saveJob(job.id));
  panel.querySelector('[data-action="cancel"]').addEventListener('click', ()=>{
    openEditId = null;
    render();
  });
}

async function saveJob(id){
  const panel = document.getElementById(`edit-${id}`);
  const statusEl = document.getElementById(`save-status-${id}`);
  const updates = readFieldForm(panel);

  statusEl.className = 'save-status';
  statusEl.textContent = 'Saving…';

  try{
    const res = await apiFetch(`/admin/jobs/${encodeURIComponent(id)}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(updates),
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.error || 'Could not save changes.');

    const idx = allJobs.findIndex(j => j.id === id);
    if(idx !== -1) allJobs[idx] = data;

    statusEl.className = 'save-status success';
    statusEl.textContent = 'Saved.';
    setTimeout(()=>{ openEditId = null; render(); }, 500);
  }catch(err){
    statusEl.className = 'save-status error';
    statusEl.textContent = err.message || 'Could not save changes.';
  }
}

async function deleteJob(id){
  const job = allJobs.find(j => j.id === id);
  const label = job ? `"${job.title}" at ${job.company}` : 'this listing';
  if(!confirm(`Delete ${label}? This can't be undone.`)) return;

  try{
    const res = await apiFetch(`/admin/jobs/${encodeURIComponent(id)}`, { method: 'DELETE' });
    const data = await res.json();
    if(!res.ok) throw new Error(data.error || 'Could not delete listing.');

    allJobs = allJobs.filter(j => j.id !== id);
    render();
  }catch(err){
    alert(err.message || 'Could not delete listing.');
  }
}

// ---- Add a new listing directly (no payment required) ----
let addListingOpen = false;

document.getElementById('add-listing-btn').addEventListener('click', ()=>{
  addListingOpen = !addListingOpen;
  const card = document.getElementById('new-listing-card');
  card.style.display = addListingOpen ? 'block' : 'none';
  document.getElementById('add-listing-btn').textContent = addListingOpen ? 'Cancel' : '+ Add listing';
  if(addListingOpen) renderNewListingForm();
});

function renderNewListingForm(){
  const panel = document.getElementById('new-listing-panel');
  panel.innerHTML = `
    ${fieldFormHtml({})}
    <div class="edit-actions">
      <button class="btn primary" data-action="create">Create listing</button>
      <button class="btn ghost" data-action="cancel-create">Cancel</button>
    </div>
    <div class="save-status" id="new-listing-status"></div>
  `;
  panel.querySelector('[data-action="create"]').addEventListener('click', createListing);
  panel.querySelector('[data-action="cancel-create"]').addEventListener('click', closeNewListingForm);
}

function closeNewListingForm(){
  addListingOpen = false;
  document.getElementById('new-listing-card').style.display = 'none';
  document.getElementById('add-listing-btn').textContent = '+ Add listing';
}

async function createListing(){
  const panel = document.getElementById('new-listing-panel');
  const statusEl = document.getElementById('new-listing-status');
  const newJob = readFieldForm(panel);

  statusEl.className = 'save-status';
  statusEl.textContent = 'Creating…';

  try{
    const res = await apiFetch('/admin/jobs', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(newJob),
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.error || 'Could not create listing.');

    allJobs.unshift(data);
    statusEl.className = 'save-status success';
    statusEl.textContent = 'Listing created.';
    setTimeout(()=>{ closeNewListingForm(); render(); }, 500);
  }catch(err){
    statusEl.className = 'save-status error';
    statusEl.textContent = err.message || 'Could not create listing.';
  }
}
</script>
</body>
</html>
